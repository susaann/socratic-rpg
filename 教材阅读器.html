<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教材阅读器 — 视界探索者教团</title>
<link rel="stylesheet" href="lib/katex/katex.min.css">
<link rel="stylesheet" href="fonts/custom-font.css">
<style>
:root {
  --bg: #f5f0e8;
  --bg-secondary: #fcf9f2;
  --text: #2c2416;
  --text-secondary: #7a6b55;
  --border: #d9ceb8;
  --accent: #6b4c2a;
  --accent-light: #ede4d4;
  --accent-dark: #4d3418;
  --sidebar-width: 280px;
}
[data-theme="dark"] {
  --bg: #1a1815;
  --bg-secondary: #242120;
  --text: #ddd8d0;
  --text-secondary: #8a8075;
  --border: #3a3530;
  --accent: #bd9a6b;
  --accent-light: #2a2520;
  --accent-dark: #8a6b40;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font), -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
  background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-width); min-width: var(--sidebar-width);
  background: var(--bg-secondary); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.sidebar-header h2 { font-size: 15px; font-weight: 600; }
.sidebar-header .back-link { font-size: 12px; margin-left: auto; color: var(--text-secondary); }
#course-tree {
  flex: 1; overflow-y: auto; padding: 8px 0;
}
.course-group { margin-bottom: 4px; }
.course-header {
  padding: 10px 16px; font-weight: 600; font-size: 13px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid transparent;
}
.course-header:hover { background: var(--accent-light); }
.course-header .arrow { font-size: 10px; transition: transform .2s; width: 12px; }
.course-header.open .arrow { transform: rotate(90deg); }
.chapter-list { display: none; }
.chapter-list.open { display: block; }
.chapter-item {
  padding: 6px 16px 6px 32px; font-size: 12px; cursor: pointer;
  border-left: 2px solid transparent; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chapter-item:hover { background: var(--accent-light); color: var(--text); }
.chapter-item.active { border-left-color: var(--accent); color: var(--text); font-weight: 600; }
.section-item {
  padding: 4px 16px 4px 48px; font-size: 11px; cursor: pointer;
  border-left: 2px solid transparent; color: var(--text-secondary);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.section-item:hover { background: var(--accent-light); color: var(--text); }
.section-item.active { border-left-color: var(--accent); color: var(--text); font-weight: 500; }

/* ── Main ── */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.toolbar {
  padding: 10px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; font-size: 13px;
  background: var(--bg-secondary); flex-shrink: 0;
}
.toolbar button {
  padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg); color: var(--text); font-size: 12px; cursor: pointer;
}
.toolbar button:hover { background: var(--accent-light); }
.toolbar .file-path { color: var(--text-secondary); font-size: 11px; flex: 1; }
#content {
  flex: 1; overflow-y: auto; padding: 24px 32px;
  line-height: 2.0; font-size: 15px;
}
.heading-font { font-family: var(--heading-font), 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', '宋体', serif; }
#content h1 { font-size: 23px; margin: 12px 0 24px; padding-bottom: 12px; border-bottom: 2px solid var(--accent); }
#content h1, #content h2, #content h3, #content h4 { font-weight: 700; }
#content h2 { font-size: 19px; margin: 36px 0 16px; color: var(--accent-dark); }
#content h3 { font-size: 17px; margin: 28px 0 14px; }
#content h3.cn-heading { font-size: 18px; }
#content h4.cn-subhead {
  font-size: 15px; margin: 22px 0 10px; color: var(--accent-dark);
  font-weight: 600; letter-spacing: 0.5px;
}
#content h4.cn-subhead::before { content: '◆ '; font-size: 10px; color: var(--accent); }
#content p { margin: 18px 0; text-indent: 2em; }
#content strong { color: var(--accent-dark); }
#content code { background: var(--accent-light); padding: 2px 6px; border-radius: 3px; font-size: 90%; }
#content pre { background: var(--accent-light); padding: 14px; border-radius: 6px; overflow-x: auto; margin: 12px 0; }
#content ul, #content ol { margin: 8px 0 8px 24px; }
#content li { margin: 4px 0; }
#content table { border-collapse: collapse; margin: 12px 0; width: 100%; }
#content th, #content td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; font-size: 90%; }
#content th { background: var(--accent-light); font-weight: 600; }
#content blockquote {
  border-left: 3px solid var(--accent); padding: 8px 16px; margin: 12px 0;
  background: var(--accent-light); color: var(--text-secondary); font-style: italic;
}
#content .katex-display { margin: 16px 0; }
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text-secondary); gap: 12px;
}
.empty-state .icon { font-size: 48px; }

/* ── Mobile toggle button ── */
#menu-toggle {
  display: none; position: fixed; top: 50px; left: 10px; z-index: 1000;
  width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg); color: var(--text); font-size: 18px; cursor: pointer;
}
/* ── Responsive ── */
@media (max-width: 768px) {
  #menu-toggle { display: flex; align-items: center; justify-content: center; }
  #sidebar {
    position: fixed; top: 0; left: 0; height: 100vh; z-index: 999;
    width: 260px; min-width: 260px;
    transform: translateX(-100%); transition: transform .25s ease;
    box-shadow: 2px 0 12px rgba(0,0,0,0.2);
  }
  #sidebar.open { transform: translateX(0); }
  #sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 998;
  }
  #sidebar-overlay.show { display: block; }
  #content { padding: 12px 14px 80px; font-size: 14px; }
  #content h1 { font-size: 20px; }
  #content h2 { font-size: 17px; }
  #content h3 { font-size: 15px; }
  .toolbar { padding: 8px 10px; gap: 6px; }
}
</style>
</head>
<body>
<div id="menu-toggle" onclick="toggleSidebar()">☰</div>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<!-- ── Sidebar ── -->
<div id="sidebar">
  <div class="sidebar-header">
    <span>📚</span><h2>教材目录</h2>
    <a class="back-link" href="index.html">← 回教团</a>
  </div>
  <div id="course-tree"><div style="padding:20px;color:var(--text-secondary);font-size:13px">加载中…</div></div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div class="toolbar">
    <button onclick="toggleTheme()" title="切换主题">🌓</button>
    <button onclick="openMathPanel()" title="数学符号面板">📐 符号</button>
    <span class="file-path" id="file-path">—</span>
    <span style="font-size:11px;color:var(--text-secondary)" id="line-count">— 行 · — 字</span>
  </div>
  <div id="content">
    <div class="empty-state">
      <div class="icon">📖</div>
      <p>在左侧目录选择章节开始阅读</p>
    </div>
  </div>
</div>

<script src="lib/katex/katex.min.js"></script>
<script src="lib/katex/auto-render.min.js"></script>
<script>
// ── State ──
const state = { courses: [], currentFile: null };

// ── Theme ──
function loadTheme() {
  const t = localStorage.getItem('order_settings');
  const theme = t ? JSON.parse(t).theme : 'light';
  document.documentElement.setAttribute('data-theme', theme);
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  let s = localStorage.getItem('order_settings');
  s = s ? JSON.parse(s) : {};
  s.theme = next;
  localStorage.setItem('order_settings', JSON.stringify(s));
}
loadTheme();

// ── Math Panel ──
function openMathPanel() {
  window.open('数学符号面板.html', '_blank');
}

// ── 文件索引缓存（用于 GitHub Pages 等无目录列表的环境）──
let _fileIndex = null;

async function _loadFileIndex() {
  if (_fileIndex) return _fileIndex;
  try {
    const resp = await fetch('文件索引.json');
    if (resp.ok) {
      _fileIndex = await resp.json();
      console.log('[文件索引] 已加载，共 ' + Object.keys(_fileIndex).length + ' 个目录');
    }
  } catch(e) {
    console.warn('[文件索引] 加载失败：' + e.message);
  }
  return _fileIndex || {};
}

// ── Directory Scanner（支持 GitHub Pages，无需 node 或服务器）──
async function scanDirectory(dirUrl) {
  // 第1层：尝试 live fetch（本地 Python 服务器有目录列表）
  try {
    const resp = await fetch(dirUrl);
    if (resp.ok) {
      const html = await resp.text();
      const files = [];
      const re = /<a href="([^"]+)"/g;
      let m;
      while ((m = re.exec(html)) !== null) {
        let name = m[1];
        if (name.endsWith('/')) name = name.slice(0, -1);
        try { name = decodeURIComponent(name); } catch(e) {}
        if (name === '.' || name === '..' || name === 'Parent Directory') continue;
        files.push(name);
      }
      if (files.length > 0) return files; // 有效结果直接返回
    }
  } catch(e) {}

  // 第2层：从 文件索引.json 读取（GitHub Pages 用）
  const index = await _loadFileIndex();
  // 索引 key 是明文中文，URL 可能被 encodeURI 编码，用解码版匹配
  const keyDecoded = decodeURIComponent(dirUrl).replace(/\/$/, '') + '/';
  if (index[keyDecoded] && index[keyDecoded].length > 0) {
    console.log('[scanDirectory] 使用索引: ' + keyDecoded + ' → ' + index[keyDecoded].length + ' 个条目');
    return [...index[keyDecoded]];
  }
  const keyRaw = dirUrl.replace(/\/$/, '') + '/';
  if (keyRaw !== keyDecoded && index[keyRaw] && index[keyRaw].length > 0) {
    return [...index[keyRaw]];
  }

  return [];
}

// ── Parse chapter files ──
function parseChapters(files, coursePath) {
  const prefix = coursePath || '';
  const chapterMap = new Map();
  files.forEach(f => {
    const baseName = f.includes('/') ? f.split('/').pop() : f;
    const match = baseName.match(/^第(\d+)章_([\d.]+)_(.+)\.md$/);
    if (!match) return;
    const chNum = parseInt(match[1]);
    const secNum = match[2];
    const title = match[3];
    const fullFilename = prefix + baseName;
    if (!chapterMap.has(chNum)) {
      chapterMap.set(chNum, { chapterNum: chNum, title: '第' + chNum + '章', sections: [] });
    }
    chapterMap.get(chNum).sections.push({ num: secNum, title, filename: fullFilename });
  });
  const outline = Array.from(chapterMap.values());
  outline.sort((a, b) => a.chapterNum - b.chapterNum);
  outline.forEach(ch => {
    ch.sections.sort((a, b) => {
      const ap = a.num.split('.').map(Number);
      const bp = b.num.split('.').map(Number);
      for (let i = 0; i < Math.max(ap.length, bp.length); i++) {
        if ((ap[i]||0) !== (bp[i]||0)) return (ap[i]||0) - (bp[i]||0);
      }
      return 0;
    });
  });
  return outline;
}

// ── Scan all courses ──
async function scanCourses() {
  const items = await scanDirectory('教材/');
  const courses = [];
  for (const item of items) {
    // Check if it's a directory (has sub-files)
    const subItems = await scanDirectory('教材/' + encodeURI(item) + '/').catch(() => []);
    if (subItems.length > 0) {
      const mdFiles = subItems.filter(f => f.endsWith('.md'));
      if (mdFiles.length > 0) {
        const chapters = parseChapters(mdFiles, item + '/');
        courses.push({ courseName: item, coursePath: item + '/', chapters });
      }
    }
  }
  // Also check root-level .md files
  const rootMd = items.filter(f => f.endsWith('.md'));
  if (rootMd.length > 0) {
    const chapters = parseChapters(rootMd, '');
    courses.push({ courseName: '根目录', coursePath: '', chapters });
  }
  state.courses = courses;
  renderCourseTree();
}

// ── Render sidebar tree ──
function renderCourseTree() {
  const tree = document.getElementById('course-tree');
  if (!state.courses.length) {
    tree.innerHTML = '<div style="padding:20px;color:var(--text-secondary);font-size:13px">未找到教材，请确认 教材/ 目录存在</div>';
    return;
  }
  tree.innerHTML = state.courses.map((c, ci) => {
    const totalSections = c.chapters.reduce((s, ch) => s + ch.sections.length, 0);
    return `<div class="course-group">
      <div class="course-header" onclick="toggleCourse(this)" data-idx="${ci}">
        <span class="arrow">▶</span>
        <span>${c.courseName}</span>
        <span style="font-size:10px;color:var(--text-secondary);margin-left:auto">${c.chapters.length}章 ${totalSections}节</span>
      </div>
      <div class="chapter-list" data-idx="${ci}">
        ${c.chapters.map(ch => `
          <div class="chapter-item" onclick="toggleChapter(this);event.stopPropagation()" data-course="${ci}" data-ch="${ch.chapterNum}">
            ▶ 第${ch.chapterNum}章
          </div>
          <div class="chapter-sections" style="display:none">
            ${ch.sections.map(s => `
              <div class="section-item" onclick="loadSection('${c.coursePath}','${s.filename.replace(/'/g, "\\'")}','第${ch.chapterNum}章 ${s.num} ${s.title}');event.stopPropagation()" data-file="${s.filename}">
                ${ch.chapterNum}.${s.num} ${s.title}
              </div>
            `).join('')}
          </div>
        `).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── Tree toggles ──
function toggleCourse(el) {
  el.classList.toggle('open');
  const idx = el.dataset.idx;
  const list = document.querySelector(`.chapter-list[data-idx="${idx}"]`);
  if (list) list.classList.toggle('open');
}
function toggleChapter(el) {
  const sections = el.nextElementSibling;
  if (sections) sections.style.display = sections.style.display === 'none' ? 'block' : 'none';
  el.textContent = (sections.style.display === 'block' ? '▼' : '▶') + el.textContent.substring(1);
}

// ── Simple Markdown to HTML (with LaTeX preservation) ──
function renderMD(md) {
  // 统一换行符：CRLF → LF（Windows 风格文件会导致段落分割失败）
  let html = md.replace(/\r\n/g, '\n');

  // Escape HTML first
  html = html
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Preserve LaTeX blocks $$...$$ and inline $...$
  const latexBlocks = [];
  const latexInlines = [];
  html = html.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => {
    latexBlocks.push(tex.trim());
    return `%%LATEX_BLOCK_${latexBlocks.length - 1}%%`;
  });
  html = html.replace(/\$(.*?)\$/g, (_, tex) => {
    latexInlines.push(tex.trim());
    return `%%LATEX_INLINE_${latexInlines.length - 1}%%`;
  });

  // Chinese-style headings (auto-detect before # syntax)
  // 【小标题】→ <h4 class="cn-subhead">
  html = html.replace(/^【(.+?)】$/gm, '<h4 class="cn-subhead">$1</h4>');
  // 一、xxx / 二、xxx ... 十、xxx → <h3 class="cn-heading">
  html = html.replace(/^([一二三四五六七八九十]{1,3})[、，](.+)$/gm, '<h3 class="cn-heading heading-font">$1、$2</h3>');
  // Markdown headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2 class="heading-font">$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1 class="heading-font">$1</h1>');

  // Bold and italic
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Horizontal rules
  html = html.replace(/^---+/gm, '<hr>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Tables (simple: pipe-separated)
  html = html.replace(/^\|(.+)\|$/gm, (line) => {
    const cells = line.split('|').filter(c => c.trim()).map(c => c.trim());
    if (cells.every(c => /^[-:]+$/.test(c))) return '%%TABLE_SEP%%';
    const tag = line.startsWith('%%TABLE_SEP%%') ? '' : '';
    return cells.map(c => `<td>${c}</td>`).join('');
  });

  // Lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul>
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // Paragraphs: collapse all blank-line runs to single paragraph break
  const blocks = html.split(/\n\n+/);
  html = blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<h[1-6]/.test(b) || b.startsWith('<ul') || b.startsWith('<table')
        || b.startsWith('<blockquote') || b.startsWith('<hr') || b.startsWith('<pre')) {
      return b;
    }
    // Collapse multiple <br> into one
    return '<p>' + b.replace(/\n+/g, '<br>') + '</p>';
  }).join('\n');

  // Restore LaTeX
  html = html.replace(/%%LATEX_BLOCK_(\d+)%%/g, (_, i) => '$$' + latexBlocks[parseInt(i)] + '$$');
  html = html.replace(/%%LATEX_INLINE_(\d+)%%/g, (_, i) => '$' + latexInlines[parseInt(i)] + '$');

  return html;
}

// ── Load and display a section ──
async function loadSection(coursePath, filename, title) {
  // 移动端选完后关闭侧边栏
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
  const contentEl = document.getElementById('content');
  const filePathEl = document.getElementById('file-path');
  contentEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">加载中…</div>';

  try {
    const url = '教材/' + encodeURI(coursePath ? coursePath + filename.split('/').pop() : filename);
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const md = await resp.text();
    const html = renderMD(md);
    contentEl.innerHTML = html;
    filePathEl.textContent = decodeURIComponent(url.replace(/^教材\//, ''));

    // Render KaTeX
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(contentEl, {
        delimiters: [
          { left: '$$', right: '$$', display: true },
          { left: '$', right: '$', display: false }
        ],
        throwOnError: false
      });
    }

    // Count lines and chars
    const lines = md.split('\n').length;
    const chars = md.replace(/\s/g, '').length;  // 不含空白的有效字数
    document.getElementById('line-count').textContent = lines + ' 行 · ' + chars + ' 字';

    // Highlight active section
    document.querySelectorAll('.section-item.active').forEach(el => el.classList.remove('active'));
    const el = document.querySelector(`.section-item[data-file="${CSS.escape(filename)}"]`);
    if (el) { el.classList.add('active'); el.scrollIntoView({ block: 'nearest' }); }

  } catch (e) {
    contentEl.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>加载失败：${e.message}</p></div>`;
  }
}

// ── URL param: auto-load file ──
function getURLParam(name) {
  const url = new URL(window.location.href);
  return url.searchParams.get(name);
}

// ── Init ──
(async () => {
  await scanCourses();
  const fileParam = getURLParam('file');
  if (fileParam) {
    // Parse course path from filename
    // e.g., "高等数学上册/第1章_1.1_映射与函数.md" → coursePath="高等数学上册/", filename="第1章_1.1_映射与函数.md"
    const parts = fileParam.split('/');
    let coursePath = '', filename = fileParam;
    if (parts.length > 1) {
      filename = parts.pop();
      coursePath = parts.join('/') + '/';
    }
    const title = filename.replace(/\.md$/, '').replace(/^第\d+章_[\d.]+_/, '');
    loadSection(coursePath, filename, title);
  }
})();
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
</script>
</body>
</html>
